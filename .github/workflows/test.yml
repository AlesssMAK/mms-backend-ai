name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    # Pinned to 22.04 (Jammy) because mongodb-memory-server downloads
    # MongoDB binaries from official mongodb.org distribution and there
    # are no published binaries for Ubuntu 24.04 (Noble) — the auto-
    # detection on ubuntu-latest fails before any test runs.
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
